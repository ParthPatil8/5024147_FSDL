            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary/30 selection:text-primary">
<!-- TopAppBar Fragment (Hidden Navigation per Suppresion Rule) -->
<header class="fixed top-0 w-full flex justify-between items-center px-8 py-6 z-50">
<div class="text-2xl font-['Manrope'] font-extrabold text-[#6bff8f] drop-shadow-[0_0_10px_rgba(107,255,143,0.3)] tracking-tight">
            Carbon Ethereal
        </div>
<div>
<span class="material-symbols-outlined text-[#6bff8f] opacity-80 hover:opacity-100 transition-opacity cursor-pointer">help_outline</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-[480px] z-10">
<!-- Glassmorphic Login Card -->
<div class="glass-card ghost-border rounded-2xl p-8 md:p-12 shadow-[0px_20px_40px_rgba(0,0,0,0.4),0px_0px_15px_rgba(107,255,143,0.1)] transition-all duration-500 hover:backdrop-blur-[40px]">
<!-- Branding/Heading -->
<div class="mb-10 text-center">
<h1 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight mb-2">Welcome Back</h1>
<p class="text-on-surface-variant body-md leading-relaxed">Resume your journey in luminous stewardship.</p>
</div>
<!-- Form -->
<div class="space-y-6">
<!-- Username Input -->
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1" for="username">Username</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-sm">person</span>
</div>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/20 focus:bg-surface-bright transition-all duration-300 outline-none" id="username" placeholder="Enter your handle" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1" for="password">Password</label>
<a class="text-[10px] uppercase tracking-tighter text-primary/80 hover:text-primary transition-colors" href="#">Forgot Access?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-sm">lock</span>
</div>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/20 focus:bg-surface-bright transition-all duration-300 outline-none" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-primary text-on-primary font-headline font-bold py-4 rounded-full shadow-[0_0_20px_rgba(107,255,143,0.3)] hover:shadow-[0_0_30px_rgba(107,255,143,0.5)] active:scale-95 transition-all duration-300 flex items-center justify-center gap-2 group" onclick="login()">
<span>Initiate Login</span>
<span class="material-symbols-outlined text-lg transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</div>
</div>
<!-- Footer Link -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant text-sm">
                    New to the ecosystem? 
                    <a class="text-primary font-semibold hover:underline underline-offset-4 decoration-primary/30 transition-all" href="register.html">Create an account</a>
</p>
</div>
</div>
<!-- Decorative Element: Data Visualization Hint -->
<div class="mt-12 flex justify-center gap-12 opacity-20">
<div class="flex flex-col items-center">
<div class="h-16 w-1 bg-gradient-to-t from-primary to-transparent rounded-full mb-2"></div>
<span class="text-[10px] font-label uppercase tracking-widest">Atmospheric</span>
</div>
<div class="flex flex-col items-center">
<div class="h-24 w-1 bg-gradient-to-t from-primary to-transparent rounded-full mb-2"></div>
<span class="text-[10px] font-label uppercase tracking-widest">Ethereal</span>
</div>
<div class="flex flex-col items-center">
<div class="h-12 w-1 bg-gradient-to-t from-primary to-transparent rounded-full mb-2"></div>
<span class="text-[10px] font-label uppercase tracking-widest">Organic</span>
</div>
</div>

<!-- Footer Component -->
<footer class="fixed bottom-0 w-full flex flex-col md:flex-row justify-between items-center px-8 py-8 gap-4 font-['Inter'] text-xs tracking-wide leading-relaxed text-slate-500">
<div class="opacity-80">© 2024 Carbon Ethereal. Luminous Stewardship.</div>
<div class="flex gap-6">
<a class="hover:text-white transition-colors duration-300" href="#">Privacy Policy</a>
<a class="hover:text-white transition-colors duration-300" href="#">Terms of Service</a>
<a class="hover:text-white transition-colors duration-300" href="#">Carbon Methodology</a>
</div>
</footer>
<!-- Background Decorative Visuals -->
<div class="fixed top-1/4 -left-20 w-96 h-96 bg-primary/5 rounded-full blur-[120px] -z-10"></div>
<div class="fixed bottom-1/4 -right-20 w-96 h-96 bg-tertiary/5 rounded-full blur-[120px] -z-10"></div>
<script>
async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch("http://127.0.0.1:5000/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.user_id) {
        localStorage.setItem("user_id", data.user_id);
        window.location.href = "dashboard_new.html";
    } else {
        alert("Invalid credentials");
    }
}
</script>
